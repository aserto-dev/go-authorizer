---
name: ci

on:
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:
    inputs:
      proto_ref:
      proto_sha:
  push:
    branches:
      - main
    # Publish `v1.2.3` tags as releases.
    tags:
      - v*
  # Run tests for PRs
  pull_request:

env:
  BUF_REPO: "buf.build/aserto-dev/authorizer"
  BUF_VER: 1.66.1
  GO_LANGCI_LINT_VER: 2.11.4
  GO_TESTSUM_VER: 1.13.0

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      -
        uses: actions/create-github-app-token@v2
        id: app-token
        with:
          app-id: ${{ vars.CODEGEN_APP_ID }}
          private-key: ${{ secrets.CODEGEN_APP_KEY }}
      -
        name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}
      -
        name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true
      -
        name: Setup buf
        uses: bufbuild/buf-action@v1
        with:
          version: ${{ env.BUF_VER }}
          setup_only: true
      -
        name: Delete generated code
        run: |
          rm -rf ./aserto
      -
        name: Get latest version tag from Buf Registry
        id: buf-latest
        run: |
          echo "VERSION=$(buf registry module label list ${BUF_REPO} --format json | jq -r '.labels[0].name')" >> "$GITHUB_OUTPUT"
      -
        name: Buf Generate
        run: |
          echo "${{ env.BUF_REPO }}:${{ steps.buf-latest.outputs.VERSION }}"
          buf generate ${{ env.BUF_REPO }}:${{ steps.buf-latest.outputs.VERSION }}
      -
        name: Lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v${{ env.GO_LANGCI_LINT_VER }}
          args: --timeout=5m
      -
        name: Test Setup
        uses: gertd/action-gotestsum@v3.0.0
        with:
          gotestsum_version: ${{ env.GO_TESTSUM_VER }}
      -
        name: Test
        run: |
          gotestsum --format short-verbose -- -count=1 -parallel=1 -v -timeout=240s -coverprofile=cover.out -coverpkg=./... ./...
      -
        name: Commit changes
        if: github.event_name == 'workflow_dispatch'
        uses: EndBug/add-and-commit@v9
        with:
          default_author: github_actions
          add: 'aserto'
