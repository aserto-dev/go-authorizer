---
# Configuration
# https://golangci-lint.run/usage/configuration/

version: "2"

linters:
  # https://golangci-lint.run/usage/configuration/#linters-configuration
  default: all

  # explicitly disabled linters
  disable:
    - depguard
    - exhaustruct
    - gochecknoglobals  # no configuration options
    - nlreturn  # redundant with wsl
    - noinlineerr 
    - paralleltest
    - revive
    - thelper
    - varnamelen
    - wrapcheck
    - wsl

  settings:
    cyclop:
      max-complexity: 12

    errcheck:
      exclude-functions:
        - fmt.Fprint
        - fmt.Fprintf
        - fmt.Fprintln
        - os.Close

    funlen:
      lines: 80
      statements: 60
      ignore-comments: true

    ireturn:
      allow:
        - error
        - empty
        - stdlib
        - generic
        - proto.Message
        - context.Context

    lll:
      line-length: 150

    tagliatelle:
      case:
        rules:
          json: snake
          yaml: snake

              
    wsl_v5:
      allow-first-in-block: true
      allow-whole-block: false
      branch-max-lines: 2 

  exclusions:
    generated: lax

formatters:
  enable:
    - gofmt
    - gofumpt
    - goimports
